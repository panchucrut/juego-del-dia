services:
  - type: web
    name: juego-del-dia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PIN
        sync: false
      - key: NEON_URL          # base Postgres en Neon (persistente); valor puesto en el dashboard
        sync: false
